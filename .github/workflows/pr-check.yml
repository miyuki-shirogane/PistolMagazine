name: PR Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [ main ]

jobs:
  pr-test:
    name: PR Test Gate
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-cov

    - name: Run all tests (Gatekeeper)
      run: |
        echo "🔐 Running tests as PR gatekeeper..."
        pytest tests/ -v --tb=short
        echo "✅ All tests passed! PR is ready for review."

    - name: Check coverage threshold
      run: |
        echo "📊 Checking coverage..."
        pytest tests/ --cov=pistol_magazine --cov-report=term --cov-fail-under=80
        echo "✅ Coverage threshold met (≥80%)"

    - name: Add PR comment on success
      if: success()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: '✅ **CI Passed**\n\nAll tests passed successfully! This PR is ready for merge.\n\n- Tests: ✅ Passed\n- Coverage: ✅ ≥80%'
          })

    - name: Add PR comment on failure
      if: failure()
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            owner: context.repo.owner,
            repo: context.repo.repo,
            issue_number: context.issue.number,
            body: '❌ **CI Failed**\n\nTests failed. Please fix the issues before merging.\n\nCheck the Actions tab for detailed failure logs.'
          })

  branch-protection-check:
    name: Branch Protection Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
    - name: Check branch protection
      run: |
        echo "🔒 Checking if target branch is protected..."
        if [[ "${{ github.base_ref }}" == "main" ]]; then
          echo "⚠️ Target branch ${{ github.base_ref }} should have branch protection enabled."
          echo "Ensure required checks are configured in repository settings."
        fi
